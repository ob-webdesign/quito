<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Galerie — QUITO Café</title>
    <meta name="description" content="Bilder aus dem Café QUITO in Frankenthal — Interieur, Kaffee, Frühstück, Team und mehr.">
    <meta name="theme-color" content="#0b0906">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --black:      #0b0906;
            --terracotta: #C4793A;
            --warm-white: #F4EFE6;
            --muted:      rgba(244, 239, 230, 0.45);
            --font-d: 'Cormorant Garamond', serif;
            --font-b: 'Source Sans 3', sans-serif;
            --ease: cubic-bezier(0.16, 1, 0.3, 1);
            --pad: clamp(1.5rem, 4vw, 3rem);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; overflow: hidden; }
        body {
            font-family: var(--font-b);
            background: var(--black);
            color: var(--warm-white);
            -webkit-font-smoothing: antialiased;
        }
        a { text-decoration: none; color: inherit; }

        /* ── SLIDES ── */
        .gallery {
            position: fixed;
            inset: 0;
            z-index: 1;
            cursor: zoom-in;
        }
        .slide {
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 1s ease;
            will-change: opacity;
        }
        .slide.active { opacity: 1; }
        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scale(1.04);
            transition: transform 7s var(--ease);
        }
        .slide.active img { transform: scale(1); }

        /* ── LIGHT GRADIENTS (legibility only — no schlieren) ── */
        .grad-top {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 180px;
            background: linear-gradient(to bottom, rgba(11,9,6,.72) 0%, transparent 100%);
            z-index: 10;
            pointer-events: none;
        }
        .grad-bottom {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 260px;
            background: linear-gradient(to top, rgba(11,9,6,.82) 0%, rgba(11,9,6,.28) 60%, transparent 100%);
            z-index: 10;
            pointer-events: none;
        }

        /* ── HOVER ZONES (prev / next) ── */
        .zone {
            position: fixed;
            top: 0; bottom: 0;
            z-index: 20;
            width: 22%;
            cursor: pointer;
            display: flex;
            align-items: center;
        }
        .zone-prev { left: 0; justify-content: flex-start; padding-left: clamp(1rem, 2.5vw, 2rem); }
        .zone-next { right: 0; justify-content: flex-end;  padding-right: clamp(1rem, 2.5vw, 2rem); }
        .zone-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 48px;
            height: 48px;
            border: 1px solid rgba(244, 239, 230, 0.22);
            border-radius: 50%;
            opacity: 0;
            transform: scale(.88);
            transition: opacity .35s ease, transform .35s var(--ease), border-color .3s;
        }
        .zone-icon svg { width: 14px; height: 14px; stroke: var(--warm-white); fill: none; stroke-width: 1.5; }
        .zone:hover .zone-icon {
            opacity: 1;
            transform: scale(1);
        }
        .zone:hover .zone-icon { border-color: rgba(244, 239, 230, 0.45); }

        /* ── TOP BAR ── */
        .bar-top {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 30;
            padding: clamp(1.2rem, 2.8vw, 2rem) var(--pad);
            padding-top: calc(clamp(1.2rem, 2.8vw, 2rem) + env(safe-area-inset-top));
            display: flex;
            align-items: center;
            justify-content: space-between;
            opacity: 0;
            animation: fadeIn .9s var(--ease) .2s forwards;
        }

        .back-link {
            font-family: var(--font-b);
            font-size: .68rem;
            font-weight: 400;
            letter-spacing: .16em;
            text-transform: uppercase;
            color: var(--muted);
            display: flex;
            align-items: center;
            gap: .65rem;
            transition: color .3s;
        }
        .back-link .line {
            display: block;
            width: 22px;
            height: 1px;
            background: currentColor;
            transition: width .35s var(--ease);
        }
        .back-link:hover { color: var(--warm-white); }
        .back-link:hover .line { width: 34px; }

        .bar-label {
            font-family: var(--font-b);
            font-size: .6rem;
            font-weight: 500;
            letter-spacing: .24em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .counter {
            display: flex;
            align-items: baseline;
            gap: .25rem;
        }
        .counter-cur {
            font-family: var(--font-d);
            font-size: 1.05rem;
            font-weight: 300;
            color: var(--warm-white);
            letter-spacing: .03em;
            min-width: 1.6ch;
            transition: opacity .25s ease;
        }
        .counter-sep {
            font-family: var(--font-b);
            font-size: .55rem;
            color: var(--muted);
            letter-spacing: .08em;
            margin: 0 .05rem;
        }
        .counter-tot {
            font-family: var(--font-d);
            font-size: .78rem;
            font-weight: 300;
            color: var(--muted);
            letter-spacing: .03em;
        }

        /* ── BOTTOM CAPTION ── */
        .caption {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            z-index: 30;
            padding: var(--pad);
            padding-bottom: calc(var(--pad) + env(safe-area-inset-bottom));
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
        }

        .caption-text { flex: 1; }
        .caption-cat {
            font-family: var(--font-b);
            font-size: .6rem;
            font-weight: 500;
            letter-spacing: .2em;
            text-transform: uppercase;
            color: var(--terracotta);
            margin-bottom: .45rem;
            opacity: 0;
            transform: translateY(6px);
            transition: opacity .45s ease .1s, transform .45s var(--ease) .1s;
        }
        .caption-title {
            font-family: var(--font-d);
            font-size: clamp(1.9rem, 4.5vw, 3.4rem);
            font-weight: 300;
            font-style: italic;
            color: var(--warm-white);
            letter-spacing: .01em;
            line-height: 1.1;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity .55s ease .2s, transform .55s var(--ease) .2s;
        }
        .caption.visible .caption-cat,
        .caption.visible .caption-title {
            opacity: 1;
            transform: translateY(0);
        }
        .caption.out .caption-cat,
        .caption.out .caption-title {
            opacity: 0;
            transform: translateY(-6px);
            transition: opacity .28s ease, transform .28s var(--ease);
        }

        /* Bottom nav */
        .cap-nav {
            display: flex;
            align-items: center;
            gap: .5rem;
            padding-bottom: .2rem;
        }
        .nav-btn {
            background: none;
            border: 1px solid rgba(244, 239, 230, 0.18);
            color: var(--muted);
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: border-color .3s, color .3s, background .3s;
        }
        .nav-btn svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 1.5; }
        .nav-btn:hover {
            border-color: rgba(244, 239, 230, 0.5);
            color: var(--warm-white);
            background: rgba(244, 239, 230, .04);
        }
        .nav-btn:focus-visible { outline: 2px solid var(--terracotta); outline-offset: 3px; }

        /* ── PROGRESS LINE ── */
        .progress {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 1px;
            background: rgba(244, 239, 230, .08);
            z-index: 40;
            pointer-events: none;
        }
        .progress-fill {
            height: 100%;
            background: var(--terracotta);
            transition: width .65s var(--ease);
            width: 0%;
        }

        /* ── LIGHTBOX ── */
        .lightbox {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(11, 9, 6, .96);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: clamp(2rem, 5vw, 4rem);
            opacity: 0;
            pointer-events: none;
            transition: opacity .5s ease;
        }
        .lightbox.open {
            opacity: 1;
            pointer-events: auto;
        }
        .lb-inner {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            max-width: min(88vw, 1100px);
        }
        .lb-inner img {
            max-height: 78vh;
            max-width: 100%;
            object-fit: contain;
            display: block;
        }
        .lb-meta {
            display: flex;
            align-items: baseline;
            gap: 1.2rem;
            margin-top: 1.1rem;
        }
        .lb-title {
            font-family: var(--font-d);
            font-size: clamp(1rem, 2vw, 1.4rem);
            font-weight: 300;
            font-style: italic;
            color: var(--warm-white);
        }
        .lb-cat {
            font-family: var(--font-b);
            font-size: .58rem;
            font-weight: 500;
            letter-spacing: .18em;
            text-transform: uppercase;
            color: var(--terracotta);
        }
        .lb-close {
            position: absolute;
            top: -2.4rem;
            right: 0;
            background: none;
            border: none;
            color: var(--muted);
            font-family: var(--font-b);
            font-size: .6rem;
            font-weight: 500;
            letter-spacing: .16em;
            text-transform: uppercase;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: .5rem;
            padding: 0;
            transition: color .3s;
        }
        .lb-close::after {
            content: '';
            display: block;
            width: 14px;
            height: 1px;
            background: currentColor;
        }
        .lb-close:hover { color: var(--warm-white); }
        .lb-close:focus-visible { outline: 2px solid var(--terracotta); outline-offset: 3px; }

        /* ── INITIAL FADE ── */
        @keyframes fadeIn { to { opacity: 1; } }

        /* ── MOBILE ── */
        @keyframes hint-arrow {
            0%   { opacity: 0; transform: scale(.88); }
            25%  { opacity: 1; transform: scale(1); }
            75%  { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(.88); }
        }
        @media (max-width: 768px) {
            .bar-label { display: none; }
            .zone { width: 28%; }
            .zone-next .zone-icon {
                animation: hint-arrow 2s var(--ease) 0.8s 1;
            }
        }
        @media (max-width: 480px) {
            .caption-title { font-size: 1.75rem; }
            .cap-nav { display: none; }
        }

        /* ── REDUCED MOTION ── */
        @media (prefers-reduced-motion: reduce) {
            .slide { transition: opacity .3s ease; }
            .slide img { transition: none; transform: scale(1); }
            .caption-cat, .caption-title { transition: opacity .2s ease; }
            .bar-top { animation: none; opacity: 1; }
        }

        /* === FOOTER === */
        footer { background: var(--black); color: #fff; padding: clamp(3rem,6vw,5rem) 0 calc(clamp(2rem,4vw,3rem) + env(safe-area-inset-bottom)); }
        .foot-inner { max-width: var(--max); margin: 0 auto; padding: 0 var(--pad); display: flex; flex-direction: column; align-items: center; gap: 0; text-align: center; }
        .foot-logo { margin-bottom: 2rem; }
        .foot-logo img  { height: 30px; filter: invert(1); margin: 0 auto; }
        .foot-logo-text { font-family: var(--font-b); font-weight: 700; font-size: 1.6rem; letter-spacing: .12em; text-transform: uppercase; color: #fff; display: none; }
        .foot-info { display: flex; flex-direction: row; flex-wrap: wrap; align-items: center; justify-content: center; gap: 0; margin-bottom: 1.75rem; }
        .foot-info p { font-size: .95rem; color: rgba(255,255,255,.55); line-height: 1.7; }
        .foot-info p + p::before { content: '·'; margin: 0 1.25rem; color: rgba(255,255,255,.25); }
        .foot-info a { color: rgba(255,255,255,.55); transition: color .2s; }
        .foot-info a:hover { color: #fff; }
        .foot-social { display: flex; align-items: center; justify-content: center; gap: .6rem; margin-bottom: 2.5rem; color: rgba(255,255,255,.55); font-size: .92rem; transition: color .2s; }
        .foot-social:hover { color: #fff; }
        .foot-social svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
        .foot-divider { width: 48px; height: 1px; background: rgba(255,255,255,.15); margin: 0 auto 2rem; }
        .foot-bottom { display: flex; flex-direction: row; align-items: center; justify-content: center; gap: 2rem; flex-wrap: wrap; }
        .foot-copy { font-size: .78rem; color: rgba(255,255,255,.3); }
        .foot-links { display: flex; gap: 2rem; list-style: none; }
        .foot-links a { font-size: .78rem; color: rgba(255,255,255,.4); transition: color .2s; }
        .foot-links a:hover { color: #fff; }
        .foot-credit { font-size: .78rem; color: rgba(255,255,255,.2); }
        .foot-credit-sep { color: rgba(255,255,255,.15); margin: 0 .4em; }
        .foot-credit-block { display: none; }
        @media (max-width: 480px) {
            .foot-info { flex-direction: column; gap: .35rem; }
            .foot-info p + p::before { content: none; }
            .foot-bottom { flex-direction: column; gap: .6rem; }
            .foot-credit-inline, .foot-credit-sep { display: none; }
            .foot-credit-block { display: block; text-align: center; margin-top: calc(-0.6rem + .15rem); }
        }
    </style>
</head>
<body>

<!-- SLIDES -->
<div class="gallery" id="gallery" aria-label="Galerie Slideshow"></div>

<!-- GRADIENTS -->
<div class="grad-top"></div>
<div class="grad-bottom"></div>

<!-- HOVER ZONES -->
<div class="zone zone-prev" id="zonePrev" role="button" aria-label="Vorheriges Bild">
    <div class="zone-icon">
        <svg viewBox="0 0 14 14"><polyline points="9,2 4,7 9,12"/></svg>
    </div>
</div>
<div class="zone zone-next" id="zoneNext" role="button" aria-label="Nächstes Bild">
    <div class="zone-icon">
        <svg viewBox="0 0 14 14"><polyline points="5,2 10,7 5,12"/></svg>
    </div>
</div>

<!-- TOP BAR -->
<div class="bar-top">
    <a href="index.html" class="back-link">
        <span class="line"></span>Zurück
    </a>
    <span class="bar-label">Galerie</span>
    <div class="counter">
        <span class="counter-cur" id="counterCur">01</span>
        <span class="counter-sep">/</span>
        <span class="counter-tot" id="counterTot">07</span>
    </div>
</div>

<!-- CAPTION -->
<div class="caption" id="caption">
    <div class="caption-text">
        <div class="caption-cat"  id="captionCat"></div>
        <div class="caption-title" id="captionTitle"></div>
    </div>
    <nav class="cap-nav" aria-label="Bildnavigation">
        <button class="nav-btn" id="prevBtn" aria-label="Vorheriges Bild">
            <svg viewBox="0 0 14 14"><polyline points="9,2 4,7 9,12"/></svg>
        </button>
        <button class="nav-btn" id="nextBtn" aria-label="Nächstes Bild">
            <svg viewBox="0 0 14 14"><polyline points="5,2 10,7 5,12"/></svg>
        </button>
    </nav>
</div>

<!-- PROGRESS -->
<div class="progress"><div class="progress-fill" id="progressFill"></div></div>

<!-- GALERIE-DATEN (wird von scripts/update-galerie.sh aktualisiert) -->
<script id="galerie-data">
window.GALERIE_DATA = [
  {"src":"hero.WEBP","title":"Das Café","cat":"Interieur","orient":"landscape"},
  {"src":"cafe-innen.JPG","title":"Innenraum","cat":"Interieur","orient":"both"},
  {"src":"kaffee.jpeg","title":"Specialty Coffee","cat":"Kaffee","orient":"portrait"},
  {"src":"fruehstueck.jpeg","title":"Frühstück","cat":"Frühstück","orient":"portrait"},
  {"src":"essen.JPG.jpg","title":"Mittagessen","cat":"Essen","orient":"landscape"},
  {"src":"team.JPG","title":"Unser Team","cat":"Team","orient":"landscape"},
  {"src":"story-bild.WEBP","title":"Unsere Geschichte","cat":"Geschichte","orient":"landscape"},
  {"src":"tisch.jpg","title":"tisch","cat":"Neu","orient":"portrait"}
];
</script>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Bild vergrößert">
    <div class="lb-inner">
        <button class="lb-close" id="lbClose">Schließen</button>
        <img id="lbImg" src="" alt="">
        <div class="lb-meta">
            <span class="lb-title" id="lbTitle"></span>
            <span class="lb-cat"   id="lbCat"></span>
        </div>
    </div>
</div>

<script>
(function () {
    var isMobile    = window.innerWidth <= 768;
    var AUTO_MS     = 4000;
    var current     = 0;
    var total       = 0;
    var autoTimer   = null;
    var SLIDES      = [];

    var gallery      = document.getElementById('gallery');
    var caption      = document.getElementById('caption');
    var captionCat   = document.getElementById('captionCat');
    var captionTitle = document.getElementById('captionTitle');
    var counterCur   = document.getElementById('counterCur');
    var counterTot   = document.getElementById('counterTot');
    var progressFill = document.getElementById('progressFill');
    var lightbox     = document.getElementById('lightbox');
    var lbImg        = document.getElementById('lbImg');
    var lbTitle      = document.getElementById('lbTitle');
    var lbCat        = document.getElementById('lbCat');

    function fmt(n) { return n < 10 ? '0' + n : '' + n; }

    // Bilddaten aus Inline-Variable laden (via scripts/update-galerie.sh aktuell gehalten)
    var all = window.GALERIE_DATA || [];
    SLIDES = all.filter(function (s) {
        var o = s.orient || 'both';
        return o === 'both' || (isMobile ? o === 'portrait' : o === 'landscape');
    }).map(function (s) {
        return { src: '../bilder/' + s.src, title: s.title, cat: s.cat };
    });
    if (SLIDES.length === 0) {
        SLIDES = all.map(function (s) {
            return { src: '../bilder/' + s.src, title: s.title, cat: s.cat };
        });
    }
    init();

    function init() {
        total = SLIDES.length;
        counterTot.textContent = fmt(total);

        SLIDES.forEach(function (s, i) {
            var div = document.createElement('div');
            div.className = 'slide' + (i === 0 ? ' active' : '');
            var img = document.createElement('img');
            img.src      = s.src;
            img.alt      = s.title + ' — Café QUITO';
            img.loading  = i < 2 ? 'eager' : 'lazy';
            img.decoding = 'async';
            div.appendChild(img);
            gallery.appendChild(div);
        });

        progressFill.style.width = (1 / total * 100) + '%';
        updateCaption(false);
        autoTimer = setInterval(next, AUTO_MS);
    }

    function updateCaption(animate) {
        if (animate) {
            caption.classList.remove('visible');
            caption.classList.add('out');
        }
        var delay = animate ? 300 : 450;
        setTimeout(function () {
            captionCat.textContent   = SLIDES[current].cat;
            captionTitle.textContent = SLIDES[current].title;
            caption.classList.remove('out');
            caption.classList.add('visible');
        }, delay);
    }

    function slides() { return gallery.querySelectorAll('.slide'); }

    function goTo(idx) {
        if (idx === current) return;
        slides()[current].classList.remove('active');
        current = (idx + total) % total;
        slides()[current].classList.add('active');
        counterCur.textContent = fmt(current + 1);
        progressFill.style.width = ((current + 1) / total * 100) + '%';
        updateCaption(true);
        resetAuto();
    }

    function next() { goTo(current + 1); }
    function prev() { goTo(current - 1); }

    function resetAuto() {
        clearInterval(autoTimer);
        autoTimer = setInterval(next, AUTO_MS);
    }

    // Navigation buttons
    document.getElementById('prevBtn').addEventListener('click', function (e) { e.stopPropagation(); prev(); });
    document.getElementById('nextBtn').addEventListener('click', function (e) { e.stopPropagation(); next(); });
    document.getElementById('zonePrev').addEventListener('click', prev);
    document.getElementById('zoneNext').addEventListener('click', next);

    // Click center of gallery → lightbox
    gallery.addEventListener('click', openLb);

    // Keyboard
    document.addEventListener('keydown', function (e) {
        if (lightbox.classList.contains('open')) {
            if (e.key === 'Escape') closeLb();
            if (e.key === 'ArrowLeft')  { closeLb(); prev(); }
            if (e.key === 'ArrowRight') { closeLb(); next(); }
            return;
        }
        if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); next(); }
        if (e.key === 'ArrowLeft') prev();
        if (e.key === 'Enter') openLb();
    });

    // Touch swipe
    var tx = 0, ty = 0, swiping = false;
    gallery.addEventListener('touchstart', function (e) {
        tx = e.touches[0].clientX;
        ty = e.touches[0].clientY;
        swiping = true;
    }, { passive: true });
    gallery.addEventListener('touchend', function (e) {
        if (!swiping) return;
        swiping = false;
        var dx = e.changedTouches[0].clientX - tx;
        var dy = e.changedTouches[0].clientY - ty;
        if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 48) {
            dx < 0 ? next() : prev();
        } else if (Math.abs(dx) < 8 && Math.abs(dy) < 8) {
            openLb();
        }
    }, { passive: true });

    // Lightbox
    function openLb() {
        var s = SLIDES[current];
        lbImg.src = s.src;
        lbImg.alt = s.title + ' — Café QUITO';
        lbTitle.textContent = s.title;
        lbCat.textContent   = s.cat;
        lightbox.classList.add('open');
        clearInterval(autoTimer);
    }
    function closeLb() {
        lightbox.classList.remove('open');
        resetAuto();
    }
    document.getElementById('lbClose').addEventListener('click', closeLb);
    lightbox.addEventListener('click', function (e) {
        if (e.target === lightbox) closeLb();
    });
})();
</script>

</body>
</html>
